[project]
name = "open-jetson"
version = "0.1.0"
description = "Minimal agentic TUI for running LLMs on Jetson edge devices"
requires-python = ">=3.10"
dependencies = [
    "textual>=3.0",
    "httpx>=0.27",
    "pyyaml>=6.0",
]

[project.scripts]
open-jetson = "src.app:main"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["src*"]
